name: "SonarCloud Quality Analysis"

on:
  push:
    branches: [main, develop]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar-team-delta:
    name: SonarCloud — TeamDelta
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage — TeamDelta
        run: npm run test --workspace=apps/team-delta

      - name: SonarCloud Scan — TeamDelta
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: apps/team-delta
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_TEAM_DELTA }}

  sonar-team-amaze:
    name: SonarCloud — TeamAmaze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage — TeamAmaze
        run: npm run test --workspace=apps/team-amaze

      - name: SonarCloud Scan — TeamAmaze
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: apps/team-amaze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_TEAM_AMAZE }}
